  function setStatus(msg) { if (loading) loading.textContent = msg; }

    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 fill=\"none\"><use href=\"#i-info\"><\u002Fuse><\u002Fsvg>Presets are best-effort, not all-or-nothing.<\u002Fspan>\n          <button onclick=\"{{ onDismissResult }}\" style=\"padding:7px 18px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent,#107c41);border:1px solid transparent;color:var(--on-accent,#fff)\" style-hover=\"background:var(--accent-hover,#0e6e3a)\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TOAST -->\n  <sc-if value=\"{{ toastV }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;left:50%;bottom:66px;transform:translateX(-50%);z-index:55;display:flex;align-items:center;gap:9px;padding:9px 15px;border-radius:9px;background:var(--layer,#fff);border:1px solid var(--stroke,rgba(0,0,0,.08));box-shadow:0 8px 26px var(--shadow,rgba(0,0,0,.16));animation:sh-pop .18s ease both\">\n      <span style=\"width:18px;height:18px;border-radius:50%;background:var(--accent-soft,#e8f3ec);display:flex;align-items:center;justify-content:center;color:var(--accent-text,#0e6b36)\"><svg viewBox=\"0 0 24 24\" style=\"width:12px;height:12px\" fill=\"none\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n      <span style=\"font-size:13px;font-weight:600;color:var(--text,#1a1a1a)\">{{ toastV.text }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- demo controls -->\n  <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:6px;padding:6px 7px 6px 10px;border-radius:11px;background:var(--flyout,rgba(248,248,248,.86));backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);border:1px solid var(--flyout-stroke,rgba(0,0,0,.09));box-shadow:0 5px 18px var(--shadow,rgba(0,0,0,.14))\">\n    <span style=\"font-size:9.5px;font-weight:800;letter-spacing:.7px;color:var(--text-3,#8a8a8a)\">DEMO<\u002Fspan>\n    <div style=\"width:1px;height:16px;background:var(--stroke,rgba(0,0,0,.1))\"><\u002Fdiv>\n    <button onclick=\"{{ onToggleTheme }}\" style=\"display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--subtle,#fbfbfb);border:1px solid var(--stroke,rgba(0,0,0,.08));color:var(--text,#1a1a1a)\" style-hover=\"background:var(--subtle-hover,#eee)\"><svg viewBox=\"0 0 24 24\" style=\"width:14px;height:14px\" fill=\"none\"><use href=\"#{{ themeIcon }}\"><\u002Fuse><\u002Fsvg>{{ themeLabel }}<\u002Fbutton>\n    <button onclick=\"{{ onToggleHomelab }}\" style=\"display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--subtle,#fbfbfb);border:1px solid var(--stroke,rgba(0,0,0,.08));color:var(--text,#1a1a1a)\" style-hover=\"background:var(--subtle-hover,#eee)\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ homelabDot }}\"><\u002Fspan>Home-lab<\u002Fbutton>\n    <button onclick=\"{{ onReset }}\" title=\"Reset layout\" style=\"display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--subtle,#fbfbfb);border:1px solid var(--stroke,rgba(0,0,0,.08));color:var(--text-2,#5c5c5c)\" style-hover=\"background:var(--subtle-hover,#eee)\"><svg viewBox=\"0 0 24 24\" style=\"width:13px;height:13px\" fill=\"none\"><use href=\"#i-refresh\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- reopen tray button when flyout closed -->\n  <sc-if value=\"{{ flyoutClosed }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;right:20px;bottom:60px;z-index:36;font-size:12px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);background:rgba(0,0,0,.32);padding:5px 10px;border-radius:7px;backdrop-filter:blur(8px)\">Tray icon ↘ reopens screen-hop<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.pcs = [\n      {id:'work', name:'Work', kind:'pc', local:true},\n      {id:'gaming', name:'Gaming', kind:'pc'},\n      {id:'homelab', name:'Home-lab', kind:'server'},\n    ];\n    this.monitorsMeta = [\n      {id:'left', label:'Left 27\"', model:'Dell U2723QE', port:'DP-1', res:'2560\\u00d71440', hz:60, phys:'left'},\n      {id:'center', label:'Center 32\"', model:'LG 32UN880', port:'HDMI-2', res:'3840\\u00d72160', hz:60, phys:'center'},\n      {id:'right', label:'Right 27\"', model:'Dell U2723QE', port:'DP-2', res:'2560\\u00d71440', hz:60, phys:'right'},\n    ];\n    this.presets = [\n      {id:'work', name:'Work', hotkey:'1', map:{left:'work',center:'work',right:'work'}},\n      {id:'trading', name:'Trading', hotkey:'2', map:{left:'work',center:'gaming',right:'work'}},\n      {id:'couch', name:'Couch', hotkey:'3', map:{left:'gaming',center:'gaming',right:'gaming'}},\n      {id:'pair', name:'Pair', hotkey:'4', map:{left:'work',center:'homelab',right:'gaming'}},\n    ];\n    this.steps = ['Sending DDC/CI command','Waiting for monitor','Verifying active input'];\n    this._timers = [];\n    this.deskRef = React.createRef();\n    this.state = {\n      theme:'light', flyoutOpen:true, deskOpen:false, hint:false,\n      owners:{left:'work', center:'gaming', right:'work'},\n      online:{work:true, gaming:true, homelab:true},\n      sendMenuFor:null, switching:null, confirm:null, result:null, toast:null, hoverPc:null,\n      dragging:null, dragPath:'', dragOverPc:null,\n    };\n  }\n  componentWillUnmount(){ this._timers.forEach(t=>clearTimeout(t)); if(this._mv){ window.removeEventListener('mousemove',this._mv); window.removeEventListener('mouseup',this._up); } }\n  later(fn,ms){ const t=setTimeout(()=>{fn();},ms); this._timers.push(t); return t; }\n  pc(id){ return this.pcs.find(p=>p.id===id); }\n  colorVar(id){ return id==='work'?'--owner-work':id==='gaming'?'--owner-gaming':'--owner-homelab'; }\n  softVar(id){ return id==='work'?'rgba(17,124,68,.13)':id==='gaming'?'rgba(58,111,176,.14)':'rgba(14,138,138,.14)'; }\n  monLabel(id){ return this.monitorsMeta.find(m=>m.id===id).label; }\n  countOwned(pcId, owners){ owners=owners||this.state.owners; return Object.values(owners).filter(x=>x===pcId).length; }\n\n  toggleTheme(){ this.setState(s=>({theme:s.theme==='light'?'dark':'light'})); }\n  toggleFlyout(){ this.setState(s=>({flyoutOpen:!s.flyoutOpen, hint:false, sendMenuFor:null})); }\n  openDesk(){ this.setState({deskOpen:true, flyoutOpen:false, sendMenuFor:null}); }\n  closeDesk(){ this.setState({deskOpen:false, sendMenuFor:null}); }\n  toggleHomelab(){ this.setState(s=>({online:{...s.online, homelab:!s.online.homelab}})); }\n  setSendMenu(id){ this.setState(s=>({sendMenuFor: s.sendMenuFor===id?null:id})); }\n  onTileDown(monitorId, e){\n    if(e.button!==undefined && e.button!==0) return; e.preventDefault();\n    const idx=this.monitorsMeta.findIndex(m=>m.id===monitorId);\n    this._pending={monitorId, idx, sx:e.clientX, sy:e.clientY, moved:false};\n    this._mv=(ev)=>this.onWinMove(ev); this._up=(ev)=>this.onWinUp(ev);\n    window.addEventListener('mousemove', this._mv); window.addEventListener('mouseup', this._up);\n  }\n  onWinMove(e){\n    const p=this._pending; if(!p) return;\n    if(!p.moved && Math.hypot(e.clientX-p.sx, e.clientY-p.sy)<5) return;\n    p.moved=true;\n    const el=this.deskRef.current; if(!el) return;\n    const r=el.getBoundingClientRect();\n    const cx=e.clientX-r.left, cy=e.clientY-r.top;\n    const ax=0.6413*r.width, ay=8+p.idx*98+37;\n    const path='M'+ax+','+ay+' C '+(ax-90)+','+ay+' '+(cx+90)+','+cy+' '+cx+','+cy;\n    let over=null;\n    for(let i=0;i<this.pcs.length;i++){\n      const left=r.left+0.0239*r.width, right=left+0.2174*r.width, top=r.top+(8+i*98), bottom=top+74;\n      if(e.clientX>=left&&e.clientX<=right&&e.clientY>=top&&e.clientY<=bottom){ over=this.pcs[i].id; break; }\n    }\n    this.setState({dragging:{monitorId:p.monitorId}, dragPath:path, dragOverPc:over});\n  }\n  onWinUp(){\n    if(this._mv){ window.removeEventListener('mousemove', this._mv); window.removeEventListener('mouseup', this._up); this._mv=null; this._up=null; }\n    const p=this._pending; this._pending=null; if(!p) return;\n    const over=this.state.dragOverPc;\n    this.setState({dragging:null, dragPath:'', dragOverPc:null});\n    if(p.moved){ if(over) this.requestSend(p.monitorId, over); }\n    else { this.setSendMenu(p.monitorId); }\n  }\n  reset(){ this._timers.forEach(t=>clearTimeout(t)); this._timers=[]; this.setState({owners:{left:'work',center:'gaming',right:'work'}, online:{work:true,gaming:true,homelab:true}, switching:null, confirm:null, result:null, toast:null, sendMenuFor:null}); }\n\n  requestSend(monitorId, toPc){\n    const {owners, online} = this.state;\n    const from = owners[monitorId];\n    this.setState({sendMenuFor:null});\n    if(from===toPc) return;\n    if(!online[from]){ this.setState({confirm:{kind:'stranded', monitorId, from, toPc}}); return; }\n    if(!online[toPc]){ this.setState({confirm:{kind:'stranded', monitorId, from, toPc, targetOffline:true}}); return; }\n    if(from==='work' && this.countOwned('work')===1 && toPc!=='work'){ this.setState({confirm:{kind:'blind', monitorId, from, toPc}}); return; }\n    this.startSwitch(monitorId, from, toPc);\n  }\n  confirmProceed(){ const c=this.state.confirm; this.setState({confirm:null}); if(c && c.kind==='blind'){ if(c.preset){ const p=this.presets.find(x=>x.id===c.preset); this.applyPreset(p); } else { this.startSwitch(c.monitorId, c.from, c.toPc); } } }\n  confirmCancel(){ this.setState({confirm:null}); }\n\n  startSwitch(monitorId, from, toPc){\n    const willRetry = Math.random()<0.28;\n    this.setState({switching:{monitorId, from, toPc, attempt:1, step:0, willRetry}});\n    this.runSteps(monitorId, from, toPc, 1, willRetry);\n  }\n  runSteps(monitorId, from, toPc, attempt, willRetry){\n    this.later(()=>this.setState(s=> s.switching?{switching:{...s.switching, step:1}}:null), 480);\n    this.later(()=>this.setState(s=> s.switching?{switching:{...s.switching, step:2}}:null), 980);\n    this.later(()=>{\n      if(attempt===1 && willRetry){\n        this.setState(s=> s.switching?{switching:{...s.switching, attempt:2, step:0}}:null);\n        this.runSteps(monitorId, from, toPc, 2, false);\n      } else {\n        this.setState(s=>({ owners:{...s.owners,[monitorId]:toPc}, switching:null, toast:{text:this.monLabel(monitorId)+' \\u2192 '+this.pc(toPc).name} }));\n        this.later(()=>this.setState(st=>st.toast?{toast:null}:null), 2400);\n      }\n    }, 1450);\n  }\n\n  requestPreset(preset){\n    const {owners} = this.state;\n    this.setState({sendMenuFor:null});\n    const resultHasWork = Object.values(preset.map).includes('work');\n    const nowHasWork = Object.values(owners).includes('work');\n    if(nowHasWork && !resultHasWork){ this.setState({confirm:{kind:'blind', preset:preset.id}}); return; }\n    this.applyPreset(preset);\n  }\n  applyPreset(preset){\n    const changes = Object.keys(preset.map).filter(m=>this.state.owners[m]!==preset.map[m]);\n    if(changes.length===0){ this.setState({toast:{text:'Already on '+preset.name}}); this.later(()=>this.setState({toast:null}),1800); return; }\n    const results=[]; let i=0;\n    const done=()=>{\n      const fails=results.filter(r=>!r.ok);\n      if(fails.length){ this.setState({result:{presetName:preset.name, items:results}}); }\n      else { this.setState({toast:{text:'Applied \\u201c'+preset.name+'\\u201d'}}); this.later(()=>this.setState({toast:null}),2200); }\n    };\n    const next=()=>{\n      if(i>=changes.length){ done(); return; }\n      const mId=changes[i]; const toPc=preset.map[mId]; const from=this.state.owners[mId];\n      if(!this.state.online[toPc]){ results.push({monitorId:mId, ok:false, toPc, reason:this.pc(toPc).name+' is offline'}); i++; next(); return; }\n      if(!this.state.online[from]){ results.push({monitorId:mId, ok:false, toPc, reason:this.pc(from).name+' is offline \\u2014 press input button'}); i++; next(); return; }\n      this.setState({switching:{monitorId:mId, from, toPc, attempt:1, step:0, preset:preset.name}});\n      this.later(()=>this.setState(s=>s.switching?{switching:{...s.switching,step:1}}:null),300);\n      this.later(()=>this.setState(s=>s.switching?{switching:{...s.switching,step:2}}:null),620);\n      this.later(()=>{ this.setState(s=>({owners:{...s.owners,[mId]:toPc}, switching:null})); results.push({monitorId:mId, ok:true, toPc}); i++; next(); }, 950);\n    };\n    next();\n  }\n  retryResultItem(item){\n    this.setState({result:null});\n    if(this.state.online[item.toPc]){ this.startSwitch(item.monitorId, this.state.owners[item.monitorId], item.toPc); }\n    else { this.setState({confirm:{kind:'stranded', monitorId:item.monitorId, from:this.state.owners[item.monitorId], toPc:item.toPc, targetOffline:true}}); }\n  }\n\n  themeVarsStr(){\n    const L={\n      '--bg':'#f3f3f3','--bg-2':'#eaeaea','--layer':'#ffffff','--layer-2':'#f6f6f6',\n      '--subtle':'#fbfbfb','--subtle-hover':'#eeeeee','--subtle-press':'#e8e8e8',\n      '--stroke':'rgba(0,0,0,.08)','--ctl-stroke':'rgba(0,0,0,.16)','--kbd-bg':'rgba(0,0,0,.055)',\n      '--text':'#1a1a1a','--text-2':'#5c5c5c','--text-3':'#8a8a8a',\n      '--accent':'#107c41','--accent-hover':'#0e6e3a','--accent-press':'#0c5e32','--accent-text':'#0e6b36','--on-accent':'#ffffff',\n      '--accent-soft':'#e8f3ec','--accent-soft-stroke':'#bfe0cb',\n      '--flyout':'rgba(249,249,249,.86)','--flyout-stroke':'rgba(0,0,0,.08)','--tray':'rgba(243,243,243,.78)','--tray-solid':'#eef0f2','--menu':'#fbfbfb',\n      '--danger':'#c42b1c','--danger-text':'#b22a1c','--danger-bg':'#fdf1f0','--danger-stroke':'#f0cbc7',\n      '--warn-text':'#8a5300','--warn-accent':'#b26a00','--warn-bg':'#fff7ea','--warn-stroke':'#efd9ae',\n      '--ok-text':'#0e6b36','--ok-bg':'#ecf6ef',\n      '--owner-work':'#117c44','--owner-gaming':'#3a6fb0','--owner-homelab':'#0e8a8a',\n      '--shadow':'rgba(0,0,0,.14)','--shadow-strong':'rgba(0,0,0,.22)','--scrim':'rgba(0,0,0,.3)',\n      '--wall-a':'#6e93b8','--wall-b':'#3c5a78','--wall-c':'#9db8d0',\n    };\n    const D={\n      '--bg':'#1f1f1f','--bg-2':'#272727','--layer':'#2b2b2b','--layer-2':'#323232',\n      '--subtle':'rgba(255,255,255,.045)','--subtle-hover':'rgba(255,255,255,.085)','--subtle-press':'rgba(255,255,255,.03)',\n      '--stroke':'rgba(255,255,255,.09)','--ctl-stroke':'rgba(255,255,255,.13)','--kbd-bg':'rgba(255,255,255,.1)',\n      '--text':'#ffffff','--text-2':'rgba(255,255,255,.73)','--text-3':'rgba(255,255,255,.46)',\n      '--accent':'#4abc7c','--accent-hover':'#57c886','--accent-press':'#3fa86c','--accent-text':'#6fd49a','--on-accent':'#07210f',\n      '--accent-soft':'rgba(74,188,124,.16)','--accent-soft-stroke':'rgba(74,188,124,.36)',\n      '--flyout':'rgba(43,43,43,.86)','--flyout-stroke':'rgba(255,255,255,.08)','--tray':'rgba(40,40,40,.8)','--tray-solid':'#2c2c2c','--menu':'#2d2d2d',\n      '--danger':'#e04a3c','--danger-text':'#ff99a0','--danger-bg':'#371d1b','--danger-stroke':'#5a2e2a',\n      '--warn-text':'#f2c879','--warn-accent':'#e7a93c','--warn-bg':'#312a18','--warn-stroke':'#544326',\n      '--ok-text':'#74d08f','--ok-bg':'#16301e',\n      '--owner-work':'#4abc7c','--owner-gaming':'#5a93d6','--owner-homelab':'#2bb3b3',\n      '--shadow':'rgba(0,0,0,.5)','--shadow-strong':'rgba(0,0,0,.62)','--scrim':'rgba(0,0,0,.5)',\n      '--wall-a':'#2a3340','--wall-b':'#161e27','--wall-c':'#39485c',\n    };\n    const v = this.state.theme==='dark'?D:L;\n    return Object.keys(v).map(k=>k+':'+v[k]).join(';');\n  }\n\n  buildConfirm(){\n    const c=this.state.confirm; if(!c) return null;\n    if(c.kind==='blind'){\n      const toName = c.preset ? null : this.pc(c.toPc).name;\n      const body = c.preset\n        ? 'Applying \\u201c'+this.presets.find(p=>p.id===c.preset).name+'\\u201d sends every monitor away from Work. This PC \\u2014 the one you\\u2019re looking at \\u2014 will have no display afterward.'\n        : 'Sending '+this.monLabel(c.monitorId)+' to '+toName+' leaves Work (this PC) with no display. You won\\u2019t see this screen after the switch.';\n      return {kind:'blind', icon:'i-alert', iconBg:'var(--danger-bg,#fdf1f0)', iconColor:'var(--danger,#c42b1c)',\n        title:'This PC will go blind', body,\n        tip:'Tip: keep at least one monitor on Work, or have another PC ready to switch it back.', tipIcon:'i-info', tipBg:'var(--warn-bg,#fff7ea)', tipStroke:'var(--warn-stroke,#efd9ae)', tipColor:'var(--warn-text,#8a5300)',\n        showCancel:true, secondary:'Cancel', primary:'Switch anyway', primaryExtra:'background:var(--danger,#c42b1c);color:#fff;'};\n    }\n    if(c.kind==='stranded'){\n      const body = c.targetOffline\n        ? this.pc(c.toPc).name+' is offline or asleep, so it can\\u2019t take over '+this.monLabel(c.monitorId)+'. Bring it online first \\u2014 or press the monitor\\u2019s physical input button to switch by hand.'\n        : this.monLabel(c.monitorId)+' is currently driven by '+this.pc(c.from).name+', which is offline or asleep. Software can\\u2019t pull a monitor away from an unreachable PC. Press the monitor\\u2019s physical input button to take it.';\n      return {kind:'stranded', icon:'i-alert', iconBg:'var(--warn-bg,#fff7ea)', iconColor:'var(--warn-accent,#b26a00)',\n        title:'Monitor is stranded', body,\n        tip:'On most monitors: press the Input / Source button on the bezel, then pick this PC\\u2019s connector ('+(c.targetOffline?this.monitorsMeta.find(m=>m.id===c.monitorId).port:this.monitorsMeta.find(m=>m.id===c.monitorId).port)+').', tipIcon:'i-info', tipBg:'var(--bg-2,#eaeaea)', tipStroke:'var(--stroke,rgba(0,0,0,.08))', tipColor:'var(--text-2,#5c5c5c)',\n        showCancel:true, secondary:'Cancel', primary:'Got it', primaryExtra:'background:var(--accent,#107c41);color:var(--on-accent,#fff);'};\n    }\n    return null;\n  }\n\n  renderVals(){\n    const s=this.state;\n    const online=s.online, owners=s.owners;\n    const onlineCount=Object.values(online).filter(Boolean).length;\n    const peersOk = onlineCount===this.pcs.length;\n    const monitorsView = this.monitorsMeta.map(m=>{\n      const ownerId=owners[m.id]; const owner=this.pc(ownerId);\n      const ownerOnline=online[ownerId];\n      const sw=s.switching && s.switching.monitorId===m.id ? s.switching : null;\n      const menuOpen = s.sendMenuFor===m.id && !sw;\n      let switchText='';\n      if(sw){ switchText = sw.attempt===2 ? 'Retrying\\u2026 (2/3)' : '\\u2192 '+this.pc(sw.toPc).name; }\n      const targets=this.pcs.map(p=>{\n        const current=p.id===ownerId;\n        const offline=!online[p.id];\n        const disabled=current||offline;\n        let extra;\n        if(current) extra='background:var(--accent-soft,#e8f3ec);border:1px solid var(--accent-soft-stroke,#bfe0cb);color:var(--accent-text,#0e6b36);cursor:default;';\n        else if(offline) extra='background:var(--subtle,#fbfbfb);border:1px solid var(--stroke,rgba(0,0,0,.08));color:var(--text-3,#8a8a8a);cursor:not-allowed;opacity:.7;';\n        else extra='background:var(--subtle,#fbfbfb);border:1px solid var(--ctl-stroke,rgba(0,0,0,.16));color:var(--text,#1a1a1a);cursor:pointer;';\n        return {id:p.id, name:p.name, colorVar:this.colorVar(p.id), current, offline, disabled, extra, onPick:()=>this.requestSend(m.id,p.id)};\n      });\n      return {\n        id:m.id, label:m.label, sub:m.model+' \\u00b7 '+m.port+' \\u00b7 '+m.res+' @ '+m.hz+'Hz',\n        ownerId, ownerName:owner.name, ownerColorVar:this.colorVar(ownerId), ownerOnline,\n        stranded:!ownerOnline, isSwitching:!!sw, idle:!sw, menuOpen, switchText, chev: menuOpen?'180deg':'0deg',\n        top: 8 + this.monitorsMeta.indexOf(m)*98, tileZ: menuOpen?6:2, tileBorder: (menuOpen||(s.dragging&&s.dragging.monitorId===m.id))?'var(--accent-soft-stroke,#bfe0cb)':'var(--stroke,rgba(0,0,0,.08))', tileCursor:(s.dragging&&s.dragging.monitorId===m.id)?'grabbing':'grab', onTileDown:(e)=>this.onTileDown(m.id,e),\n        switchStep: sw?sw.step:0, switchStepText: sw?this.steps[sw.step]:'', attempt: sw?sw.attempt:1, toName: sw?this.pc(sw.toPc).name:'',\n        model:m.model, port:m.port, ownerSoftVar:this.softVar(ownerId),\n        targets, onRowClick:()=>this.setSendMenu(m.id),\n      };\n    });\n    const presetsView=this.presets.map(p=>{\n      const active=Object.keys(p.map).every(k=>owners[k]===p.map[k]);\n      const extra = active ? 'background:var(--accent-soft,#e8f3ec);border:1px solid var(--accent-soft-stroke,#bfe0cb);color:var(--accent-text,#0e6b36);' : 'background:var(--subtle,#fbfbfb);border:1px solid var(--ctl-stroke,rgba(0,0,0,.16));color:var(--text,#1a1a1a);';\n      return {id:p.id, name:p.name, hotkey:p.hotkey, hotkeyFull:'Ctrl+Alt+'+p.hotkey, active, extra, onApply:()=>this.requestPreset(p)};\n    });\n    const resV=s.result?{\n      title:'Applied \\u201c'+s.result.presetName+'\\u201d \\u2014 '+s.result.items.filter(i=>i.ok).length+' of '+s.result.items.length+' switched',\n      sub:'Some monitors didn\\u2019t respond. You can retry the ones that failed.',\n      items:s.result.items.map(it=>({\n        label:this.monLabel(it.monitorId)+'  \\u2192  '+this.pc(it.toPc).name,\n        msg: it.ok?'Switched successfully':it.reason,\n        msgColor: it.ok?'var(--ok-text,#0e6b36)':'var(--danger-text,#b22a1c)',\n        icon: it.ok?'i-check':'i-close', iconBg: it.ok?'var(--ok-bg,#ecf6ef)':'var(--danger-bg,#fdf1f0)', iconColor: it.ok?'var(--ok-text,#0e6b36)':'var(--danger,#c42b1c)',\n        canRetry:!it.ok, onRetry:()=>this.retryResultItem(it),\n      })),\n    }:null;\n    const toastV=s.toast?{text:s.toast.text}:null;\n    const peerDot = peersOk ? 'var(--ok-text,#1aa251)' : 'var(--warn-accent,#e7a93c)';\n    const pcY={work:45,gaming:143,homelab:241}; const monY={left:45,center:143,right:241};\n    const pcsView=this.pcs.map((p,i)=>({ id:p.id, name:p.name, isLocal:!!p.local, online:online[p.id], dotColor: online[p.id]?'var(--ok-text,#1aa251)':'var(--text-3,#8a8a8a)', dotRing: online[p.id]?'var(--ok-bg,#ecf6ef)':'transparent', count:this.countOwned(p.id), colorVar:this.colorVar(p.id), softVar:this.softVar(p.id), top:8+i*98, kindIcon:p.kind==='server'?'i-server':'i-pc', nodeExtra: (s.dragging&&s.dragOverPc===p.id)?'box-shadow:0 0 0 2px var(--accent,#107c41),0 8px 20px var(--shadow,rgba(0,0,0,.22));border-color:var(--accent,#107c41);background:var(--accent-soft,#e8f3ec);':'', dimVar: (s.hoverPc&&s.hoverPc!==p.id)?'.4':'1', countText: online[p.id]?(this.countOwned(p.id)+(this.countOwned(p.id)===1?' monitor':' monitors')):'offline \\u00b7 asleep', onEnter:()=>this.setState({hoverPc:p.id}), onLeave:()=>this.setState({hoverPc:null}) }));\n    const cables=this.monitorsMeta.map(m=>{ const sw=s.switching&&s.switching.monitorId===m.id?s.switching:null; const tp=sw?sw.toPc:owners[m.id]; const y1=pcY[tp],y2=monY[m.id]; return {key:m.id, d:'M222,'+y1+' C 372,'+y1+' 440,'+y2+' 590,'+y2, stroke:'var('+this.colorVar(tp)+')', opacity:(s.dragging&&s.dragging.monitorId===m.id)?0.1:((s.hoverPc&&s.hoverPc!==tp)?0.13:1), width: sw?3.6:2.6, dash: sw?'7 7':'0', anim: sw?'sh-dash .55s linear infinite':'none' }; });\n    return {\n      themeVars:this.themeVarsStr(),\n      flyoutOpen:s.flyoutOpen, flyoutClosed:!s.flyoutOpen && !s.deskOpen,\n      deskOpen:s.deskOpen, showHint:s.hint && !s.flyoutOpen,\n      themeIcon: s.theme==='dark'?'i-sun':'i-moon', themeLabel: s.theme==='dark'?'Dark':'Light',\n      timeStr:'2:14 PM', dateStr:'6/26/2026',\n      monitorsView, presetsView,\n      peersOk, peersText: peersOk?'All online':(onlineCount+'/'+this.pcs.length+' online'), peerDotColor:peerDot,\n      trayBtnBg: s.flyoutOpen?'var(--accent-soft,#e8f3ec)':'transparent',\n      trayBtnBorder: s.flyoutOpen?'var(--accent-soft-stroke,#bfe0cb)':'transparent',\n      peerPillBg: peersOk?'var(--ok-bg,#ecf6ef)':'var(--warn-bg,#fff7ea)',\n      peerPillStroke: peersOk?'var(--accent-soft-stroke,#bfe0cb)':'var(--warn-stroke,#efd9ae)',\n      peerPillText: peersOk?'var(--ok-text,#0e6b36)':'var(--warn-text,#8a5300)',\n      homelabDot: online.homelab?'var(--ok-text,#1aa251)':'var(--text-3,#8a8a8a)',\n      confirmV:this.buildConfirm(), resultV:resV, toastV,\n      onTrayClick:()=>this.toggleFlyout(),\n      onToggleTheme:()=>this.toggleTheme(),\n      onToggleHomelab:()=>this.toggleHomelab(),\n      onReset:()=>this.reset(),\n      onOpenDesk:()=>this.openDesk(),\n      onOpenSettings:()=>{},\n      onCapturePreset:()=>{ this.setState({toast:{text:'Capture preset \\u2014 see canvas'}}); this.later(()=>this.setState({toast:null}),1800); },\n      onConfirmProceed:()=>this.confirmProceed(),\n      onConfirmCancel:()=>this.confirmCancel(),\n      onDismissResult:()=>this.setState({result:null}),\n      onCloseDesk:()=>this.closeDesk(),\n      pcsView, cables, deskRef:this.deskRef, dragPath:s.dragPath, dragging:!!s.dragging,\n      degraded:!peersOk, degradedText:'Home-lab is unreachable \\u2014 switches that involve it are paused.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
