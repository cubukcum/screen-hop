name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build + test (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (all targets, warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  package:
    name: package + hashes (windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: cargo build --release -p screenhop-ui -p screenhop-spike
      - name: SHA-256 the binaries
        shell: pwsh
        run: |
          $bins = "target/release/screenhop-ui.exe", "target/release/screenhop-spike.exe"
          Get-FileHash $bins -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash, [System.IO.Path]::GetFileName($_.Path) } |
            Tee-Object -FilePath SHA256SUMS.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenhop-windows
          path: |
            target/release/screenhop-ui.exe
            target/release/screenhop-spike.exe
            SHA256SUMS.txt
          if-no-files-found: error

  installer:
    name: installer (windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: cargo build --release -p screenhop-ui -p screenhop-spike
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\screen-hop.iss'
      - name: SHA-256 the installer
        shell: pwsh
        run: |
          Get-FileHash installer\dist\screen-hop-setup.exe -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash, "screen-hop-setup.exe" } |
            Tee-Object -FilePath installer\dist\SHA256SUMS-installer.txt
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: screen-hop-installer
          path: |
            installer/dist/screen-hop-setup.exe
            installer/dist/SHA256SUMS-installer.txt
          if-no-files-found: error
